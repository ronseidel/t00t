<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>t00t</title>

<!-- Favicon: 💨 emoji -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💨</text></svg>">

<!-- Open Graph -->
<meta property="og:title" content="t00t — a fart noise app">
<meta property="og:description" content="A 3×3 fart soundboard. Tap to toot. Made for m0rry.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ronseidel.github.io/t00t/">
<meta property="og:image" content="https://ronseidel.github.io/t00t/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="t00t — a fart noise app">
<meta name="twitter:description" content="A 3×3 fart soundboard. Tap to toot. Made for m0rry.">
<meta name="twitter:image" content="https://ronseidel.github.io/t00t/og.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  /* 
    t00t v05 — 2026-04-19
    ----------------------
    v01: Initial 3x3 fart soundboard, Web Audio API synthesis
    v02: Rebuilt audio — PCM → WAV blobs → Audio elements
    v03: Rewrote generators with flutter AM modulation
    v04: Real MP3 samples from ronseidel.github.io/t00t/sounds/
         Pool of 3 Audio elements per sound for rapid-fire taps.
    v05: Footer: two lines now. Top line keeps "for m0rry" (the
         heart of the app). Bottom line adds "part of 0fam" with
         link to 0utput.co. Removed redundant "0fam ·" from the
         top line since the new line carries that framing.
         Smaller, fainter treatment so it tucks under without
         fighting the m0rry line.
         Switched footer fade from opacity to color-mix w/
         transparent so .zero green can still punch through —
         opacity cascades to children and can't be overridden,
         color can.
  */

  :root {
    --bg: #F9F9F9;
    --ink: #034D32;
    --accent: #028454;
    --surface: #ffffff;
    --border: #e0e0e0;
    --radius: 16px;
    --font: 'Space Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --ink: #a8d5ba;
      --accent: #34d399;
      --surface: #1a1a1a;
      --border: #2a2a2a;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 12px 0 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .zero { color: var(--accent); }

  header p {
    font-size: 0.7rem;
    opacity: 0.5;
    margin-top: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    flex: 1;
    align-content: center;
  }

  .pad {
    aspect-ratio: 1;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.08s, box-shadow 0.08s;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
  }

  .pad:active, .pad.hit {
    transform: scale(0.93);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(2, 132, 84, 0.25);
  }

  .pad .emoji { font-size: 2rem; line-height: 1; pointer-events: none; }
  .pad .label {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; opacity: 0.7; pointer-events: none;
  }

  .pad .ripple {
    position: absolute; border-radius: 50%; background: var(--accent);
    opacity: 0.2; transform: scale(0); animation: rip 0.4s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rip { to { transform: scale(2.5); opacity: 0; } }

  footer {
    text-align: center; padding: 10px 0 6px; flex-shrink: 0;
  }
  footer .line { display: block; font-size: 0.6rem; color: color-mix(in srgb, var(--ink) 30%, transparent); letter-spacing: 0.05em; }
  footer .line-fam { font-size: 0.55rem; color: color-mix(in srgb, var(--ink) 25%, transparent); margin-top: 3px; letter-spacing: 0.05em; }
  footer .line-fam a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; padding-bottom: 0; }
  footer .line-fam a:hover { color: var(--ink); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>t<span class="zero">00</span>t</h1>
    <p>a fart noise app</p>
  </header>
  <div class="grid" id="grid"></div>
  <footer>
    <span class="line">v05 · for m<span class="zero">0</span>rry</span>
    <span class="line-fam">part of <a href="https://0utput.co" target="_blank" rel="noopener"><span class="zero">0</span>fam</a> — a growing family of small, focused apps</span>
  </footer>
</div>

<script>
const BASE = 'https://ronseidel.github.io/t00t/sounds/';
const POOL_SIZE = 3;

const PADS = [
  { id: 'classic',   emoji: '💨', label: 'Classic' },
  { id: 'squeaker',  emoji: '🐁', label: 'Squeaker' },
  { id: 'rumbler',   emoji: '🌋', label: 'Rumbler' },
  { id: 'ripper',    emoji: '⚡', label: 'Ripper' },
  { id: 'bubbler',   emoji: '🫧', label: 'Bubbler' },
  { id: 'tuba',      emoji: '🎺', label: 'Tuba' },
  { id: 'pffft',     emoji: '😤', label: 'Pffft' },
  { id: 'whoopee',   emoji: '🎪', label: 'Whoopee' },
  { id: 'hog',       emoji: '🐷', label: 'Hog' },
];

// Pre-load audio pools
const audioPool = {};
PADS.forEach(pad => {
  const url = BASE + pad.id + '.mp3';
  audioPool[pad.id] = Array.from({ length: POOL_SIZE }, () => {
    const a = new Audio(url);
    a.preload = 'auto';
    return a;
  });
  audioPool[pad.id]._idx = 0;
});

function playSound(id) {
  const pool = audioPool[id];
  const a = pool[pool._idx % pool.length];
  pool._idx++;
  a.currentTime = 0;
  a.play().catch(() => {});
}

// Build grid
const grid = document.getElementById('grid');
PADS.forEach(pad => {
  const el = document.createElement('button');
  el.className = 'pad';
  el.innerHTML = `<span class="emoji">${pad.emoji}</span><span class="label">${pad.label}</span>`;

  function fire(e) {
    e.preventDefault();
    if (e.type === 'mousedown' && el._lastTouch && Date.now() - el._lastTouch < 500) return;
    if (e.type === 'touchstart') el._lastTouch = Date.now();

    playSound(pad.id);

    el.classList.add('hit');
    const r = document.createElement('div');
    r.className = 'ripple';
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = '50%'; r.style.top = '50%';
    r.style.marginLeft = -size / 2 + 'px';
    r.style.marginTop = -size / 2 + 'px';
    el.appendChild(r);
    setTimeout(() => { el.classList.remove('hit'); r.remove(); }, 400);
  }

  el.addEventListener('touchstart', fire, { passive: false });
  el.addEventListener('mousedown', fire);
  grid.appendChild(el);
});
</script>
</body>
</html>
